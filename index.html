<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>SymptoAI</title>

<style>

body{
font-family:sans-serif;
background:#eef2ff;
padding:20px;
}

h1{
color:#3b4bff;
}

textarea{
width:100%;
height:100px;
}

button{
padding:10px;
margin:5px;
border:none;
background:#4c6fff;
color:white;
border-radius:6px;
}

#result{
margin-top:20px;
background:white;
padding:15px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>SymptoAI</h1>

<select id="lang">
<option value="jp">日本語</option>
<option value="en">English</option>
</select>

<p>症状を入力してください</p>

<textarea id="symptom"></textarea>

<br>

<button onclick="startVoice()">🎤音声入力</button>
<button onclick="analyze()">AI分析</button>
<button onclick="findHospital()">近くの病院</button>

<div id="result"></div>

<script>

let diseases=[

{
name:"風邪",
symptoms:["発熱","咳","鼻水","喉"],
danger:"低",
treatment:"安静、水分補給"
},

{
name:"インフルエンザ",
symptoms:["高熱","関節痛","倦怠感","咳"],
danger:"中",
treatment:"安静、早めに受診"
},

{
name:"肺炎",
symptoms:["高熱","呼吸","胸痛","咳"],
danger:"高",
treatment:"すぐに病院受診"
}

]

function analyze(){

let input=document.getElementById("symptom").value

let result=[]

diseases.forEach(d=>{

let score=0

d.symptoms.forEach(s=>{

if(input.includes(s)){

score++

}

})

if(score>0){

result.push({
disease:d,
score:score
})

}

})

result.sort((a,b)=>b.score-a.score)

showResult(result)

saveData(input,result)

}

function showResult(list){

let text=""

if(list.length==0){

text="候補の病気は見つかりません"

}

else{

list.forEach(r=>{

text+=

"<h3>"+r.disease.name+"</h3>"+
"危険度:"+r.disease.danger+"<br>"+
"対処:"+r.disease.treatment+"<br><br>"

})

}

document.getElementById("result").innerHTML=text

}

function startVoice(){

const recognition=new webkitSpeechRecognition()

recognition.lang="ja-JP"

recognition.start()

recognition.onresult=function(e){

document.getElementById("symptom").value=
e.results[0][0].transcript

}

}

function findHospital(){

navigator.geolocation.getCurrentPosition(function(pos){

let lat=pos.coords.latitude
let lon=pos.coords.longitude

window.open(
"https://www.google.com/maps/search/hospital/@"+lat+","+lon
)

})

}

function saveData(symptom,result){

let data=
JSON.parse(localStorage.getItem("symptomData"))||[]

data.push({

symptom:symptom,

result:result.map(r=>r.disease.name),

time:Date.now()

})

localStorage.setItem(
"symptomData",
JSON.stringify(data)
)

}

</script>

</body>

</html>
